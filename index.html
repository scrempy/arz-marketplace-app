<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARZ Marketplace</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=60">
</head>
<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="drawer" id="drawer">
    <div class="drawer-header">
        <div class="user-avatar" id="user-initials">?</div>
        <div class="user-info">
            <div id="user-display-name" class="user-name">Загрузка...</div>
            <span id="role-badge" class="role-tag">Игрок</span>
        </div>
    </div>
    <div class="menu-section-title">НАВИГАЦИЯ</div>
    <div class="menu-list">
        <div class="menu-item" onclick="showPage('home'); loadFeed('Все')">🏠 Главная доска</div>
        <div class="menu-item" onclick="showPage('create')">✍️ Подать объявление</div>
        <div class="menu-item" onclick="showPage('home'); loadFeed('Мои')">📁 Мои объявления</div>
        <div class="menu-item" onclick="openAutoPR()">🚀 Авто-пиар</div>
    </div>
    <div class="drawer-footer">
        <div class="menu-item exit-btn" onclick="tg.close()">🔙 Выход</div>
    </div>
</div>

<div class="header">
    <div class="menu-btn" onclick="openMenu()">☰ МЕНЮ</div>
    <img src="banner.jpg" class="banner" onerror="this.style.display='none'">
</div>

<div class="main-container">
    <div id="page-home" class="page active">
        <button class="srv-picker-btn" onclick="openSrv()">🌍 <span id="current-srv-name">Все серверы</span></button>
        <div id="home-feed"></div>
    </div>

    <div id="page-create" class="page">
        <h2 style="color:var(--primary)">НОВОЕ ОБЪЯВЛЕНИЕ</h2>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <div class="srv-picker-btn" id="photo-preview" onclick="document.getElementById('file-input').click()" style="height:100px; border-style:dashed">
            <span>📷 ВЫБРАТЬ ФОТО</span>
        </div>
        <select id="f-srv" class="styled-input"></select>
        <textarea id="f-txt" class="styled-input" rows="5" placeholder="Опишите товар..."></textarea>
        <button id="f-btn" class="btn-primary" onclick="submitCreate()">ОПУБЛИКОВАТЬ</button>
    </div>

    <div id="page-auto" class="page">
        <h2 style="color:var(--prem)">🚀 АВТО-ПИАР</h2>
        <div id="auto-lock" style="display:none; text-align:center; padding:40px; background:var(--card); border-radius:15px;">
            🔒 Только для <b>PREMIUM</b>
        </div>
        <div id="auto-content" style="display:none">
            <input type="file" id="auto-file-input" accept="image/*" style="display: none;">
            <div class="srv-picker-btn" id="auto-photo-preview" onclick="document.getElementById('auto-file-input').click()" style="height:100px; border-style:dashed">
                <span>📷 ФОТО ДЛЯ ПИАРА</span>
            </div>
            <textarea id="a-txt" class="styled-input" rows="4" placeholder="Текст рассылки..."></textarea>
            <input type="number" id="a-int" class="styled-input" placeholder="Интервал (мин)">
            <div id="auto-status" style="margin-bottom:15px; font-weight:bold; color:var(--admin)"></div>
            <button class="btn-primary" onclick="saveAutoPR(true)">ЗАПУСТИТЬ</button>
            <button class="btn-del" style="width:100%; margin-top:10px" onclick="saveAutoPR(false)">ОСТАНОВИТЬ</button>
        </div>
    </div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-body">
        <h2 style="color:var(--primary)">РЕДАКТИРОВАНИЕ</h2>
        <input type="file" id="edit-file-input" accept="image/*" style="display: none;">
        <div class="srv-picker-btn" id="edit-photo-preview" onclick="document.getElementById('edit-file-input').click()" style="height:100px; border-style:dashed">
            <span>📷 ИЗМЕНИТЬ ФОТО</span>
        </div>
        <select id="e-srv" class="styled-input"></select>
        <textarea id="e-txt" class="styled-input" rows="6"></textarea>
        <!-- КНОПКА ТЕПЕРЬ СВЯЗАНА ПРАВИЛЬНО -->
        <button class="btn-primary" onclick="window.saveEdit()">СОХРАНИТЬ</button>
        <button class="btn-edit" style="width:100%; margin-top:10px" onclick="window.closeEdit()">ОТМЕНА</button>
    </div>
</div>

<div id="srv-modal" class="modal">
    <h2 style="color:var(--primary)">ВЫБОР СЕРВЕРА</h2>
    <div class="srv-grid" id="srv-grid">
        <div class="srv-item" style="grid-column: 1/3; border-color:var(--primary)" onclick="selectSrv('Все')">Все серверы</div>
    </div>
    <button class="btn-primary" style="margin-top:20px" onclick="document.getElementById('srv-modal').style.display='none'">ЗАКРЫТЬ</button>
</div>

<script src="app.js?v=70"></script>
</body>
</html>
